---
- name: Install and start nginx
  hosts: web
  become: true

  vars:
    page_title: "Ansible Automation Demo"
    page_message: "This page was generated dynamically using Ansible templates."

  tasks:
    - name: Ensure nginx is installed
      dnf:
        name: nginx
        state: present

    - name: Ensure nginx is running and enabled
      service:
        name: nginx
        state: started
        enabled: true

    - name: Deploy custom index page using template
      template:
        src: ../templates/index.html.j2
        dest: /usr/share/nginx/html/index.html
        mode: '0644'
